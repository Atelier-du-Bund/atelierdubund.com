<!-- 1) Goes in <head>: hides the overlay if JS is off -->
<noscript><style>.invitation{display:none!important}</style></noscript>

<!-- 2) Goes as the first element inside <body> -->
<div class="invitation" id="invitation" role="dialog" aria-modal="true" aria-label="You're invited to the Atelier">
  <div class="env-scene">
    <button class="envelope" id="enterBtn" type="button" aria-label="Open your invitation and enter the Atelier">
      <!-- FRONT — sleek waxed letter, no seal -->
      <span class="env-face env-face--front" aria-hidden="true">
        <span class="env-invite">You're invited to the Atelier</span>
        <span class="env-hint">Press to open</span>
      </span>
      <!-- BACK — the flap that opens from the fold -->
      <span class="env-face env-face--back" aria-hidden="true">
        <span class="env-recess"></span>
        <span class="env-flap"></span>
      </span>
    </button>
  </div>
  <button class="env-skip" id="envSkip" type="button">Skip</button>
</div>

<!-- 3) Goes in the footer (.footer__base): lets visitors replay the intro -->
<button class="replay-invitation" id="replayInvitation" type="button">Replay the invitation</button>
